name: Go Test Workflow

on:
  push:
    branches:
      - master
      - release-**
  pull_request:
    branches:
      - master
      - release-**
env:
  TYK_IB_STORAGE_STORAGETYPE: file

permissions:
  contents: read

jobs:
  dependency-guard:
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'labeled') || github.event_name == 'pull_request' }}
    uses: TykTechnologies/github-actions/.github/workflows/dependency-guard.yml@d3fa20888fa2878e877e22bb7702141217290e7c  # main

  golangci-lint:
    needs: [dependency-guard]
    if: ${{ always() && (needs.dependency-guard.result == 'success' || needs.dependency-guard.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tyk Identity Broker
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2
      - name: Fetch base branch
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch origin ${{ github.base_ref }}
      - name: golangci-lint
        if: ${{ github.event_name == 'pull_request' }}
        uses: golangci/golangci-lint-action@3a919529898de77ec3da873e3063ca4b10e7f5cc  # v3
        with:
          version: latest
          args: --out-format=checkstyle:golanglint.xml --timeout=600s --max-issues-per-linter=0 --max-same-issues=0 --new-from-rev=origin/${{ github.base_ref }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: golangcilint
          retention-days: 1
          path: |
            golanglint.xml

  ci-test:
    needs: [dependency-guard]
    if: ${{ always() && (needs.dependency-guard.result == 'success' || needs.dependency-guard.result == 'skipped') }}
    name: "${{ matrix.databases }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        databases:
          - mongo-mgo
          - mongo-official
          - file
        redis-version: [5]
        mongodb-version: [4.2]
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2

      - name: Setup Go
        uses: actions/setup-go@bfdd3570ce990073878bf10f6b2d79082de49492  # v2
        with:
          go-version: "^1.21"

      - name: Install Dependencies and basic hygiene test
        id: hygiene
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.33.0

      - name: Start Redis
        uses: supercharge/redis-github-action@1f58ff85cf4f9ef3c036109c11acd8376b436b47  # 1.2.0
        with:
          redis-version: ${{ matrix.redis-version }}

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@751e4ddb1f8de2717b75f275abce04735664ef46  # 1.2.0
        with:
          mongodb-version: "${{ matrix.mongodb-version }}"

      - name: Run tests
        run: |
          ./bin/ci-tests.sh ${{ matrix.databases }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage
          retention-days: 1
          path: |
            *cov
  sonar-cloud-analysis:
    runs-on: ubuntu-latest
    needs: [ci-test, golangci-lint]
    steps:
      - name: Checkout TIB
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2
      - name: Fetch base branch
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch origin ${{ github.base_ref }}
      - name: Setup Golang
        uses: actions/setup-go@be3c94b385c4f180051c996d336f57a34c397495  # v3
        with:
          go-version: 1.22.6
      - name: Download coverage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: coverage
      - name: Download golangcilint artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: golangcilint
      - name: Check reports existence
        id: check_files
        uses: andstor/file-existence-action@f02338908d150e00a4b8bebc2dad18bd9e5229b0  # v1
        with:
          files: "*.cov, golanglint.xml"
      - name: Install Dependencies
        run: >
          go install github.com/wadey/gocovmerge@b5bfa59ec0adc420475f97f89b58045c721d761c

      - name: merge reports
        run: |
          ./bin/merge-cov.sh
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e  # master
        with:
          args: >
            -Dsonar.organization=tyktechnologies
            -Dsonar.projectKey=TykTechnologies_tyk-identity-broker
            -Dsonar.sources=.
            -Dsonar.exclusions=ci/**
            -Dsonar.coverage.exclusions=**/*_test.go,**/mocks/*.go
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.tests=.
            -Dsonar.go.coverage.reportPaths=*.cov
            -Dsonar.go.golangci-lint.reportPaths=golanglint.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  aggregator-ci-test:
    name: Unit Tests & Linting
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [ ci-test ]
    steps:
      - name: Aggregate results
        run: |
          failed=()
          # Get the needs context as JSON once
          needs_json='${{ toJSON(needs) }}'

          # Loop through all jobs in the needs context
          for job in $(echo "$needs_json" | jq -r 'keys[]'); do
            job_result=$(echo "$needs_json" | jq -r --arg job "$job" '.[$job].result')

            if [[ "$job_result" != "success" ]]; then
              failed+=("$job")
            fi
          done

          if (( ${#failed[@]} )); then
            # Join the failed job names with commas
            failed_jobs=$(IFS=", "; echo "${failed[*]}")
            echo "❌ Failed jobs ----- : $failed_jobs"
            exit 1
          fi

          echo "✅ All required jobs succeeded"
